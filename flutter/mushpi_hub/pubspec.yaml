name: mushpi_hub

description: Mobile controller for MushPi mushroom cultivation system

version: 1.0.0+1

publish_to: "none"

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.44.2"

dependencies:
  flutter:
    sdk: flutter

  # State Management (single source of truth)
  flutter_riverpod: ^3.3.2
  # riverpod_annotation: ^4.0.3

  # BLE Communication
  flutter_blue_plus: ^2.3.9

  # Environment configuration (.env)
  flutter_dotenv: ^6.0.1

  # Permissions
  permission_handler: ^12.0.3

  # Navigation
  go_router: ^17.3.0

  # Database (type-safe, auto-migrations)
  drift: ^2.14.0
  # sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.1
  path: ^1.8.3

  # Data Models (immutable, code generation)
  freezed_annotation: ^3.1.0
  # json_annotation: ^4.8.1

  # UI
  fl_chart: ^1.2.0
  google_fonts: ^8.1.0

  # Utils
  http: ^1.2.0
  # hooks_riverpod: ^3.3.2
  # flutter_hooks: ^0.21.3+1
  uuid: ^4.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^6.0.0
  riverpod_generator: ^4.0.4
  drift_dev: ^2.14.0
  freezed: ^3.2.5
  json_serializable: ^6.7.1

  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
